    <script>
        var setHome = function(obj, url) {
            try {
                obj.style.behavior = 'url(#default#homepage)';
                obj.setHomePage(url);
            } catch(e) {
                if(window.netscape) {
                    try {
                        netscape.security.PrivilegeManager.enablePrivilege('UniversalXPConnect');
                    } catch(e) {
                        alert('Sorry, this action is blocked by your browser!\n\nSolution 1:\nType "about:config" in your address bar and press Enter.\nThen set [signed.applets.codebase_principal_support] to true.\n\nSolution 2:\nManually set '+url+' as your homepage.');
                    }
                    var prefs = Components.classes['@mozilla.org/preferences-service;1'].getService(Components.interfaces.nsIPrefBranch);
                    prefs.setCharPref('browser.startup.homepage',url);
                } else {
                    alert('Sorry, your browser does not support this action.\n\nPlease manually set ' + url + ' as your homepage.');
                }
            }
        };
        var search = function(site, env) {
            var searchId = env === 'pc' ? 'search-pc' : 'search-mobile';
            var query = document.getElementById(searchId).value;
            if (!query.trim()) { // Optional: Prevent empty search
                // alert("Please enter a search term.");
                return;
            }
            var baseURL = {
                google: 'https://www.google.com/search?q=',
                baidu: 'https://www.baidu.com/s?wd=', // Kept from template, consider if needed
                bing: 'https://www.bing.com/search?q=',
                wolframalpha: 'https://www.wolframalpha.com/input/?i=',
                wolframalpha_mob: 'https://m.wolframalpha.com/input/?i='
            };
            window.open(baseURL[site] + encodeURIComponent(query), '_blank'); // Open in new tab
        };
        document.getElementById("search-form-pc").onsubmit = function(e) {
            e.preventDefault();
            search('google', 'pc');
        };
        document.getElementById("search-form-mobile").onsubmit = function(e) {
            e.preventDefault();
            search('google', 'mobile'); // Defaulting mobile search to Google, adjust as needed
        };
    </script>
